<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>LCD Terminal</title>
<style>
:root{--bg:#04070a;--on:#39ff72;--off:#2b3440;--w:30px;--h:52px;--t:4px;--gap:3px}*{box-sizing:border-box}
body{margin:0;background:radial-gradient(#0a1018,#04070a);height:100vh;display:flex;align-items:center;justify-content:center;font-family:Consolas,monospace}
.wrap{width:min(1400px,98vw);height:min(920px,98vh);display:grid;grid-template-rows:auto 1fr;gap:8px}
#kbBtn{background:#0d1420;color:#bafcca;border:1px solid #2b3950;border-radius:6px;padding:6px 10px;width:fit-content}
.display{border:1px solid #273344;border-radius:10px;padding:12px;background:#02050a;display:grid;place-items:center;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(32,var(--w));grid-template-rows:repeat(12,var(--h));gap:var(--gap)}
.cell{width:var(--w);height:var(--h);display:grid;grid-template-columns:var(--t) 1fr var(--t);grid-template-rows:var(--t) 1fr var(--t) 1fr var(--t);background:#0a1018;border-radius:4px;padding:1px}
.seg{background:var(--off);opacity:.32;border-radius:5px}.on{background:var(--on);opacity:.98;box-shadow:0 0 3px var(--on),0 0 9px color-mix(in srgb,var(--on) 70%,transparent)}
.a{grid-column:2;grid-row:1}.b{grid-column:3;grid-row:2}.c{grid-column:3;grid-row:4}.d{grid-column:2;grid-row:5}.e{grid-column:1;grid-row:4}.f{grid-column:1;grid-row:2}.g{grid-column:2;grid-row:3}
</style></head><body><div class='wrap'><button id='kbBtn'>Activar teclado</button><div class='display'><div class='grid' id='grid'></div></div></div>
<script>
(()=>{
const W=32,H=12,grid=document.getElementById('grid'),kbBtn=document.getElementById('kbBtn');
const SEG={'0':'abcdef','1':'bc','2':'abdeg','3':'abcdg','4':'bcfg','5':'acdfg','6':'acdefg','7':'abc','8':'abcdefg','9':'abcdfg','A':'abcefg','B':'cdefg','C':'adef','D':'bcdeg','E':'adefg','F':'aefg','G':'acdef','H':'bcefg','I':'bc','J':'bcde','K':'efg','L':'def','M':'abcef','N':'abcef','O':'abcdef','P':'abefg','Q':'abcfg','R':'efg','S':'acdfg','T':'defg','U':'bcdef','V':'cde','W':'bcdef','X':'bcefg','Y':'bcdfg','Z':'abdeg','-':'g','_':'d'};
const cells=[],buf=Array.from({length:H},()=>Array(W).fill('_'));let c={x:0,y:0},running=false,stop=false,speed=1,vars={},cli='',blink=true;
const bootTs=Date.now();
let mobile=document.createElement('input');mobile.style.position='fixed';mobile.style.opacity='0';document.body.appendChild(mobile);

const UTIL={trim:v=>String(v??'').trim(),upper:v=>String(v??'').toUpperCase(),lower:v=>String(v??'').toLowerCase(),rev:v=>String(v??'').split('').reverse().join(''),len:v=>String(v??'').length,pad:(v,n=2,c='0')=>String(v??'').padStart(Number(n)||2,c),hash:v=>{let h=2166136261;for(const ch of String(v??'')){h^=ch.charCodeAt(0);h=Math.imul(h,16777619)}return (h>>>0).toString(16)},slug:v=>String(v??'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,''),words:v=>String(v??'').trim().split(/\s+/).filter(Boolean),json:v=>{try{return JSON.stringify(JSON.parse(String(v)),null,0)}catch{return '{}'}}};
const FUNC_LIB={UPPER:(a)=>UTIL.upper(a),LOWER:(a)=>UTIL.lower(a),TRIM:(a)=>UTIL.trim(a),REVERSE:(a)=>UTIL.rev(a),LEN:(a)=>String(UTIL.len(a)),HASH:(a)=>UTIL.hash(a),SLUG:(a)=>UTIL.slug(a),WORDS:(a)=>String(UTIL.words(a).length),PAD:(a,b,c)=>UTIL.pad(a,b,c),CONCAT:(a,b)=>String(a??'')+String(b??''),LEFT:(a,b)=>String(a??'').slice(0,Number(b)||0),RIGHT:(a,b)=>{const t=String(a??'');const n=Number(b)||0;return t.slice(Math.max(0,t.length-n))},MID:(a,b,c)=>String(a??'').slice(Number(b)||0,(Number(b)||0)+(Number(c)||0)),REPLACE:(a,b,c)=>String(a??'').split(String(b??'')).join(String(c??'')),MATHADD:(a,b)=>String((+a||0)+(+b||0)),MATHSUB:(a,b)=>String((+a||0)-(+b||0)),MATHMUL:(a,b)=>String((+a||0)*(+b||0)),MATHDIV:(a,b)=>String((+a||0)/(+b||1)),MIN:(a,b)=>String(Math.min(+a||0,+b||0)),MAX:(a,b)=>String(Math.max(+a||0,+b||0)),CLAMP:(a,b,c)=>String(Math.min(+c||0,Math.max(+b||0,+a||0))),RANDINT:(a,b)=>String(Math.floor((+a||0)+Math.random()*((+b||0)-(+a||0)+1))),DATE:()=>new Date().toISOString().slice(0,10),TIME:()=>new Date().toISOString().slice(11,19),STAMP:()=>String(Date.now()),BASE64:(a)=>btoa(unescape(encodeURIComponent(String(a??'')))),UNBASE64:(a)=>{try{return decodeURIComponent(escape(atob(String(a??''))))}catch{return ''}},JSONMIN:(a)=>UTIL.json(a)};
const FSKEY='lcd.fs.v6';let fs={'/home/boot.seg':'CLS\nPRINT LCD_READY\nPRINT HELP','/home/demo.seg':'VAR I=0\nL:\nPRINT I\nSLEEP 120\nCLS\nADD I 1\nIF I<30 THEN GOTO L\nPRINT END','/sys/changelog.txt':'v6 useful-functions build','/home/fx.seg':'FUNC FX0001 HOLA MUNDO 9\nPRINT ${RET}'};
function saveFS(){localStorage.setItem(FSKEY,JSON.stringify(fs))}function loadFS(){try{const d=JSON.parse(localStorage.getItem(FSKEY));if(d)fs=d}catch{}}
function init(){const f=document.createDocumentFragment();for(let i=0;i<W*H;i++){const d=document.createElement('div');d.className='cell';const m={};for(const s of 'abcdefg'){const p=document.createElement('div');p.className='seg '+s;m[s]=p;d.appendChild(p)}cells.push(m);f.appendChild(d)}grid.appendChild(f)}
const id=(x,y)=>y*W+x;function draw(x,y,ch){if(x<0||x>=W||y<0||y>=H)return;ch=(ch||'_').toUpperCase();if(buf[y][x]===ch)return;buf[y][x]=ch;const M=cells[id(x,y)],segs=SEG[ch]||'';for(const s of 'abcdefg'){const on=segs.includes(s);M[s].classList.toggle('on',on);M[s].style.filter=on?`brightness(${0.88+Math.random()*0.20})`:''}}
function cls(){hideCursor();for(let y=0;y<H;y++)for(let x=0;x<W;x++)draw(x,y,'_');c={x:0,y:0};showCursor()} function nl(){c.x=0;c.y++;if(c.y>=H){for(let y=1;y<H;y++)for(let x=0;x<W;x++)draw(x,y-1,buf[y][x]);for(let x=0;x<W;x++)draw(x,H-1,'_');c.y=H-1}} function print(t){for(const r of String(t)){if(r==='\n'){nl();continue}draw(c.x,c.y,r===' '?'_':r);c.x++;if(c.x>=W)nl()}}
const wait=ms=>new Promise(r=>setTimeout(r,ms/Math.max(.1,speed)));let actx;function beep(f=440,d=120){actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d/1000)}
function parse(src){return src.split(/\r?\n/).map((l,n)=>({l:l.trim(),n:n+1})).filter(x=>x.l&&!x.l.startsWith('#'))}
const ex=s=>s.replace(/\$\{(\w+)\}/g,(_,k)=>vars[k]??'0'),num=v=>isNaN(+v)?v:+v;function tst(cnd){const m=cnd.match(/^(\w+)\s*(==|!=|>=|<=|>|<)\s*(\S+)$/);if(!m)return false;const a=num(vars[m[1]]??0),b=num(ex(m[3]));return m[2]=='=='?a==b:m[2]=='!='?a!=b:m[2]=='>='?a>=b:m[2]=='<='?a<=b:m[2]=='>'?a>b:a<b}
async function exec(src){const q=parse(src);running=true;stop=false;for(let pc=0;running&&pc<q.length;pc++){if(stop)break;const line=q[pc].l,U=line.toUpperCase();
if(U==='HELP'){print('CMDS PRINT CLS SET SLEEP BEEP SCROLL GOTO IF VAR ADD SUB MUL DIV MOD INC DEC DATE TIME RAND INPUT COLOR SPEED MAP DUMP LS CAT WRITE APPEND DEL REN CP MV RUN REBOOT NETGET NETJSON PING SYSINFO FUNC FUNCLIST ECHO LEN UPPER LOWER REPEAT REVERSE TOKENIZE NOW UPTIME')}
else if(U==='CLS')cls(); else if(U.startsWith('PRINT '))print(ex(line.slice(6))); else if(U.startsWith('SET ')){const[,x,y,ch]=line.split(/\s+/);draw(+x,+y,ch||'_')} else if(U.startsWith('SLEEP '))await wait(+line.split(/\s+/)[1]||0); else if(U.startsWith('BEEP ')){const[,f,d]=line.split(/\s+/);beep(+f||440,+d||100)}
else if(U.startsWith('SCROLL ')){const t=ex(line.slice(7));for(let i=0;i<t.length+W;i++){for(let y=0;y<H;y++)for(let x=0;x<W-1;x++)draw(x,y,buf[y][x+1]);draw(W-1,0,t[i]||'_');await wait(55)}} else if(U.startsWith('GOTO ')){const L=line.slice(5).trim()+':';const at=q.findIndex(e=>e.l.toUpperCase()===L.toUpperCase());if(at>=0){pc=at;continue}}
else if(U.startsWith('IF ')&&U.includes(' THEN ')){const [co,th]=line.slice(3).split(/\s+THEN\s+/i);if(tst(co))q.splice(pc+1,0,{l:th,n:q[pc].n})} else if(U.startsWith('VAR ')){const m=line.match(/^VAR\s+(\w+)\s*=\s*(.+)$/i);if(m)vars[m[1]]=num(ex(m[2]))}
else if(U.startsWith('ADD ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)+(+ex(v)||0)} else if(U.startsWith('SUB ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)-(+ex(v)||0)} else if(U.startsWith('MUL ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)*(+ex(v)||0)}
else if(U.startsWith('DIV ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)/(+ex(v)||1)} else if(U.startsWith('MOD ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)%(+ex(v)||1)} else if(U.startsWith('INC ')){const k=line.split(/\s+/)[1];vars[k]=(+vars[k]||0)+1} else if(U.startsWith('DEC ')){const k=line.split(/\s+/)[1];vars[k]=(+vars[k]||0)-1}
else if(U==='DATE')print(new Date().toISOString().slice(0,10).replace(/-/g,'')); else if(U==='TIME')print(new Date().toISOString().slice(11,19).replace(/:/g,'')); else if(U.startsWith('RAND ')){const[,k,a,b]=line.split(/\s+/);vars[k]=Math.floor((+a||0)+Math.random()*((+b||9)-(+a||0)+1))}
else if(U.startsWith('INPUT ')){const k=line.split(/\s+/)[1];vars[k]=await readLine()} else if(U.startsWith('COLOR ')){document.documentElement.style.setProperty('--on',line.split(/\s+/)[1]||'#39ff72')} else if(U.startsWith('SPEED ')){speed=Math.max(.1,+line.split(/\s+/)[1]||1)} else if(U.startsWith('MAP ')){const[,ch,se]=line.split(/\s+/);if(ch&&se)SEG[ch.toUpperCase()]=se.toLowerCase().replace(/[^a-g]/g,'')}

else if(U==='FUNCLIST'){print(Object.keys(FUNC_LIB).join(' '))}
else if(U.startsWith('FUNC ')){const t=line.split(/\s+/);const fn=t[1]?.toUpperCase();const a=ex(t[2]||'');const b=ex(t[3]||'');const c=ex(t[4]||'0');if(FUNC_LIB[fn]){vars.RET=FUNC_LIB[fn](a,b,c);print(String(vars.RET).slice(0,32))}else print('NOFUNC')}
else if(U==='DUMP')print(JSON.stringify(vars).replace(/[{}":,]/g,'')); else if(U.startsWith('LS'))print(Object.keys(fs).join(' ')); else if(U.startsWith('CAT ')){const p=line.slice(4).trim();print((fs[p]||'NOFILE').slice(0,80))}
else if(U.startsWith('WRITE ')){const m=line.match(/^WRITE\s+(\S+)\s+(.+)$/i);if(m){fs[m[1]]=ex(m[2]).replaceAll('\\n','\n');saveFS()}} else if(U.startsWith('APPEND ')){const m=line.match(/^APPEND\s+(\S+)\s+(.+)$/i);if(m){fs[m[1]]=(fs[m[1]]||'')+ex(m[2]).replaceAll('\\n','\n');saveFS()}}
else if(U.startsWith('DEL ')){const p=line.slice(4).trim();delete fs[p];saveFS()} else if(U.startsWith('REN ')){const[,a,b]=line.split(/\s+/);if(fs[a]!=null){fs[b]=fs[a];delete fs[a];saveFS()}} else if(U.startsWith('CP ')){const[,a,b]=line.split(/\s+/);if(fs[a]!=null){fs[b]=fs[a];saveFS()}} else if(U.startsWith('MV ')){const[,a,b]=line.split(/\s+/);if(fs[a]!=null){fs[b]=fs[a];delete fs[a];saveFS()}}
else if(U.startsWith('RUN ')){const p=line.slice(4).trim();if(fs[p])await exec(fs[p])} else if(U.startsWith('PING ')){const t=performance.now();try{await fetch(line.slice(5).trim())}catch{}print('P'+Math.round(performance.now()-t))} else if(U.startsWith('NETGET ')){try{const r=await fetch(line.slice(7).trim());print((await r.text()).slice(0,50))}catch{print('NETERR')}} else if(U.startsWith('NETJSON ')){try{const r=await fetch(line.slice(8).trim());print(JSON.stringify(await r.json()).slice(0,50))}catch{print('JSONERR')}} else if(U==='SYSINFO'){print(`W${W}H${H}V${Object.keys(vars).length}F${Object.keys(fs).length}`)}
else if(U==='REBOOT'){vars={};cls();await wait(80);if(fs['/home/boot.seg'])await exec(fs['/home/boot.seg'])}
await wait(8)}running=false}
function readLine(){return new Promise(res=>{inputMode={buf:'',done:res}})} let inputMode=null;
let cursorPainted=false,cursorPrev='_',cursorPos={x:0,y:0};
function hideCursor(){if(cursorPainted){draw(cursorPos.x,cursorPos.y,cursorPrev);cursorPainted=false}}
function showCursor(){if(running)return;hideCursor();cursorPos={x:c.x,y:c.y};cursorPrev=buf[c.y]?.[c.x]??'_';if(blink){draw(c.x,c.y,'_');cursorPainted=true}}
function drawCursor(){blink=!blink;showCursor()}setInterval(drawCursor,380);
window.addEventListener('keydown',async e=>{hideCursor();if(inputMode){if(e.key==='Enter'){const v=inputMode.buf;inputMode.done(v);inputMode=null;return}else if(e.key==='Backspace'){inputMode.buf=inputMode.buf.slice(0,-1);return}else if(e.key.length===1){inputMode.buf+=e.key.toUpperCase();return}}
if(e.key==='F10'){e.preventDefault();stop=true;running=false} if(e.key==='F5'){e.preventDefault();stop=true;running=false;vars={};cls()} if(e.key==='F9'){e.preventDefault();if(!running){const r=await readLine();if(fs[r])exec(fs[r]);else exec(r)}}
if(e.key.length===1&&!running){cli+=e.key;print(e.key)} if(e.key==='Backspace'&&!running){cli=cli.slice(0,-1);c.x=Math.max(0,c.x-1);draw(c.x,c.y,'_')} if(e.key==='Enter'&&!running&&cli){const cmd=cli.trim();cli='';nl();if(cmd)exec(cmd)}showCursor();});
kbBtn.onclick=()=>mobile.focus();mobile.addEventListener('input',e=>{if(!e.target.value)return;hideCursor();cli+=e.target.value;print(e.target.value);e.target.value='';showCursor()});
loadFS();init();cls();if(fs['/home/boot.seg'])exec(fs['/home/boot.seg']);
})();
</script></body></html>
