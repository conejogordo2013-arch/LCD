<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroSim IDE - 7 Segmentos + Teclado + C</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: #181c2f;
      --panel-2: #202743;
      --text: #e8ecff;
      --muted: #9ca8d4;
      --ok: #5ce082;
      --warn: #ffd166;
      --err: #ff6b6b;
      --accent: #70a1ff;
      --accent-2: #7bed9f;
      --border: #303a62;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: Inter, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(160deg, #0b0f1d, #121831 55%, #101730);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 12px;
      padding: 12px;
      min-height: 100vh;
    }

    .panel {
      background: rgba(24, 28, 47, 0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    .panel h2 {
      font-size: 0.95rem;
      margin: 0;
      padding: 10px 12px;
      background: #1d2440;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.3px;
    }

    .left, .right {
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .left {
      grid-template-rows: auto 1fr auto;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--border);
      background: #171d36;
      align-items: center;
    }

    button, select, input {
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #24305a;
      color: var(--text);
      padding: 7px 10px;
      font-size: 0.85rem;
    }

    button { cursor: pointer; }
    button:hover { filter: brightness(1.08); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .ok { background: #1d5b35; }
    .warn { background: #6d5122; }
    .err { background: #6b2730; }

    .editor-wrap { padding: 0; }
    #codeEditor {
      width: 100%;
      min-height: 480px;
      resize: vertical;
      border: none;
      outline: none;
      background: #0f1325;
      color: #d8e2ff;
      font-family: var(--mono);
      font-size: 0.9rem;
      line-height: 1.4;
      padding: 14px;
      tab-size: 2;
    }

    .statusbar {
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      background: #161c36;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .right {
      grid-template-rows: auto auto auto 1fr;
    }

    .display-area, .debug-grid, .pin-grid, .console {
      padding: 10px;
    }

    .seven-display {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      padding: 8px;
      background: #090d1e;
      border: 1px solid #273255;
      border-radius: 10px;
      min-height: 130px;
    }

    .digit {
      position: relative;
      width: 48px;
      height: 88px;
      background: #090d1e;
      border-radius: 8px;
    }

    .seg {
      position: absolute;
      background: #1a1f37;
      opacity: 0.12;
      border-radius: 4px;
      transition: opacity 0.03s linear, background 0.03s linear;
      box-shadow: 0 0 2px #000;
    }

    .seg.on {
      background: #ff4b4b;
      opacity: 1;
      box-shadow: 0 0 8px #ff3d3d;
    }

    .a, .d, .g { width: 30px; height: 7px; left: 9px; }
    .a { top: 4px; }
    .g { top: 40px; }
    .d { top: 76px; }
    .b, .c, .e, .f { width: 7px; height: 30px; }
    .b { top: 8px; right: 2px; }
    .c { top: 44px; right: 2px; }
    .e { top: 44px; left: 2px; }
    .f { top: 8px; left: 2px; }
    .dp { width: 8px; height: 8px; border-radius: 50%; right: -2px; bottom: -2px; }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }

    .keypad button {
      padding: 12px 0;
      font-family: var(--mono);
      font-size: 1rem;
      background: #2d3b70;
    }

    .debug-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-family: var(--mono);
      font-size: 0.78rem;
      max-height: 260px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.75rem;
    }

    th, td {
      border: 1px solid #2f3a66;
      padding: 4px 5px;
      text-align: center;
    }

    .console {
      font-family: var(--mono);
      font-size: 0.78rem;
      background: #0d1227;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="left">
      <div class="panel">
        <h2>MicroSim IDE - Editor y Compilación C</h2>
        <div class="toolbar">
          <button id="compileBtn" class="warn">Compile</button>
          <button id="runBtn" class="ok">Run</button>
          <button id="stopBtn" class="err">Stop</button>
          <button id="stepBtn">Step</button>
          <button id="resetBtn">Reset</button>
          <label>CPU Hz <input id="hzInput" type="number" min="1" max="2000" value="120" style="width:80px"/></label>
          <label>Tick ms <input id="tickInput" type="number" min="5" max="200" value="16" style="width:70px"/></label>
        </div>
        <div class="editor-wrap">
<textarea id="codeEditor">// Programa C-like compilado a ISA virtual
int inputPin = 8;
int ledPin = 2;
char key;
int counter = 0;

void setup(){
  pinMode(ledPin, OUTPUT);
  pinMode(inputPin, INPUT);
  lcd_init();
  lcd_print("INIT");
}

void loop(){
  key = keypad_read();

  if(key == '1'){
    counter = counter + 1;
    lcd_print("C001");
    digitalWrite(ledPin, HIGH);
  } else {
    digitalWrite(ledPin, LOW);
  }

  delay_ms(70);
}
</textarea>
        </div>
        <div class="statusbar"><span id="statusText">Ready.</span><span id="pcText">PC: 0</span></div>
      </div>
    </section>

    <section class="right">
      <div class="panel">
        <h2>Display 7 segmentos (multiplexado por pines)</h2>
        <div class="display-area">
          <div id="sevenDisplay" class="seven-display"></div>
        </div>
      </div>

      <div class="panel">
        <h2>Teclado matricial 4x3</h2>
        <div class="display-area keypad" id="keypad"></div>
      </div>

      <div class="panel">
        <h2>Debugger (registros, pines, memoria)</h2>
        <div class="debug-grid">
          <div><table id="regTable"></table></div>
          <div><table id="pinTable"></table></div>
          <div style="grid-column: span 2;"><table id="memTable"></table></div>
        </div>
      </div>

      <div class="panel">
        <h2>Consola</h2>
        <div id="console" class="console"></div>
      </div>
    </section>
  </div>

<script>
class MemoryManager {
  constructor(ramSize = 256, romSize = 1024) {
    this.ram = new Uint8Array(ramSize);
    this.rom = [];
  }
  resetRAM() { this.ram.fill(0); }
  read(addr) { return this.ram[addr] || 0; }
  write(addr, val) { this.ram[addr] = val & 0xFF; }
}

class PinIOSystem {
  constructor(totalPins = 24) {
    this.INPUT = 0; this.OUTPUT = 1;
    this.HIGH = 1; this.LOW = 0;
    this.pins = Array.from({ length: totalPins }, () => ({ mode: this.INPUT, value: this.LOW }));
    this.listeners = [];
  }
  pinMode(pin, mode) { this.pins[pin].mode = mode; }
  digitalWrite(pin, value) {
    if (this.pins[pin].mode !== this.OUTPUT) return;
    this.pins[pin].value = value;
    this.listeners.forEach(fn => fn(pin, value));
  }
  digitalRead(pin) { return this.pins[pin].value; }
  attachListener(fn) { this.listeners.push(fn); }
}

class InterruptController {
  constructor() { this.queue = []; }
  raise(type, payload = {}) { this.queue.push({ type, payload }); }
  next() { return this.queue.shift(); }
}

class KeypadDriver {
  constructor(pinIO, intCtrl, rowPins = [8,9,10,11], colPins = [12,13,14]) {
    this.pinIO = pinIO; this.intCtrl = intCtrl;
    this.rowPins = rowPins; this.colPins = colPins;
    this.map = [['1','2','3'],['4','5','6'],['7','8','9'],['*','0','#']];
    this.pressed = null;
    this.lastStable = null;
    this.lastChange = 0;
    this.debounceMs = 25;
  }
  press(key) { this.pressed = key; this.lastChange = performance.now(); }
  release() { this.pressed = null; this.lastChange = performance.now(); }
  scan() {
    const now = performance.now();
    if (now - this.lastChange < this.debounceMs) return null;
    if (this.lastStable !== this.pressed) {
      this.lastStable = this.pressed;
      if (this.lastStable) this.intCtrl.raise('keyboard', { key: this.lastStable });
    }
    return this.lastStable;
  }
}

class SevenSegmentDisplayDriver {
  constructor(pinIO, digitPins=[0,1,2,3], segPins=[4,5,6,7,15,16,17,18]) {
    this.pinIO = pinIO;
    this.digitPins = digitPins;
    this.segPins = segPins; // a,b,c,d,e,f,g,dp
    this.activeDigit = 0;
    this.buffer = Array(digitPins.length).fill(0);
    this.pinIO.attachListener(() => this.samplePins());
  }
  samplePins() {
    const active = this.digitPins.findIndex(p => this.pinIO.digitalRead(p) === this.pinIO.HIGH);
    if (active === -1) return;
    let mask = 0;
    for (let i=0;i<this.segPins.length;i++) if (this.pinIO.digitalRead(this.segPins[i]) === this.pinIO.HIGH) mask |= (1<<i);
    this.buffer[active] = mask;
  }
  setDigitMask(index, mask) { this.buffer[index] = mask; }
}

class RuntimeScheduler {
  constructor() { this.tasks = []; this.nowMs = 0; }
  createTask(name, intervalMs, callback) { this.tasks.push({ name, intervalMs, callback, last: 0 }); }
  tick(deltaMs) {
    this.nowMs += deltaMs;
    for (const t of this.tasks) {
      if (this.nowMs - t.last >= t.intervalMs) { t.last = this.nowMs; t.callback(); }
    }
  }
}

class CPUEmulator {
  constructor(memory, io, intCtrl, runtime) {
    this.memory = memory; this.io = io; this.intCtrl = intCtrl; this.runtime = runtime;
    this.reg = new Uint8Array(16);
    this.pc = 0; this.stack = [];
    this.program = [];
    this.halted = false;
    this.labels = {};
    this.vars = new Map();
    this.consts = { INPUT:0, OUTPUT:1, LOW:0, HIGH:1 };
    this.delayUntil = 0;
  }
  reset() { this.reg.fill(0); this.pc = 0; this.stack = []; this.halted = false; this.delayUntil = 0; }
  loadProgram(program) { this.program = program; this.pc = 0; this.halted = false; }
  evalArg(a) {
    if (typeof a === 'number') return a;
    if (this.consts[a] !== undefined) return this.consts[a];
    return this.vars.get(a) ?? 0;
  }
  step() {
    if (this.halted || this.pc >= this.program.length) { this.halted = true; return; }
    const intr = this.intCtrl.next();
    if (intr && intr.type === 'keyboard') this.vars.set('__lastKey', intr.payload.key.charCodeAt(0));

    const ins = this.program[this.pc++];
    const a = ins.args || [];
    switch (ins.op) {
      case 'SET': this.vars.set(a[0], this.evalArg(a[1])); break;
      case 'ADD': this.vars.set(a[0], (this.evalArg(a[1]) + this.evalArg(a[2])) & 0xFF); break;
      case 'EQ': this.vars.set(a[0], this.evalArg(a[1]) === this.evalArg(a[2]) ? 1 : 0); break;
      case 'JMP': this.pc = this.labels[a[0]] ?? this.pc; break;
      case 'JZ': if (this.evalArg(a[0]) === 0) this.pc = this.labels[a[1]] ?? this.pc; break;
      case 'PINMODE': this.io.pinMode(this.evalArg(a[0]), this.evalArg(a[1])); break;
      case 'DWRITE': this.io.digitalWrite(this.evalArg(a[0]), this.evalArg(a[1])); break;
      case 'DREAD': this.vars.set(a[1], this.io.digitalRead(this.evalArg(a[0]))); break;
      case 'LCD_PRINT': hardwareApi.lcdPrint(String(a[0])); break;
      case 'KREAD': this.vars.set(a[0], this.evalArg('__lastKey')); this.vars.set('__lastKey', 0); break;
      case 'DELAY': this.delayUntil = performance.now() + this.evalArg(a[0]); break;
      case 'LABEL': break;
      case 'HALT': this.halted = true; break;
      default: console.warn('Unknown op', ins.op);
    }
  }
}

class CCompiler {
  compile(source) {
    const lines = source.split('\n').map(l => l.trim()).filter(Boolean);
    const program = [];
    const labels = {};
    let loopMode = false;

    for (const raw of lines) {
      const line = raw.replace(/\/\/.*$/, '').trim();
      if (!line) continue;
      if (line.startsWith('void loop')) { loopMode = true; continue; }
      if (line === '}' && loopMode) { program.push({ op:'JMP', args:['__loop_start'] }); continue; }
      if (line.startsWith('void setup')) continue;
      if (line === '{' || line === '}') continue;

      if (line.includes('=') && line.startsWith('int ')) {
        const [name, val] = line.replace(';','').replace('int ','').split('=');
        program.push({ op:'SET', args:[name.trim(), parseInt(val.trim()) || 0]});
        continue;
      }
      if (line.includes('=') && line.startsWith('char ')) {
        const name = line.replace(';','').replace('char ','').trim();
        program.push({ op:'SET', args:[name, 0]});
        continue;
      }
      if (line.startsWith('pinMode')) {
        const [p,m] = line.match(/pinMode\((.*),(.*)\)/).slice(1).map(s=>s.trim());
        program.push({ op:'PINMODE', args:[p,m]}); continue;
      }
      if (line.startsWith('digitalWrite')) {
        const [p,v] = line.match(/digitalWrite\((.*),(.*)\)/).slice(1).map(s=>s.trim());
        program.push({ op:'DWRITE', args:[p,v]}); continue;
      }
      if (line.startsWith('keypad_read')) continue;
      if (line.includes('= keypad_read()')) {
        const name = line.split('=')[0].trim();
        program.push({ op:'KREAD', args:[name]}); continue;
      }
      if (line.startsWith('lcd_print')) {
        const text = line.match(/lcd_print\((.*)\)/)[1].trim().replace(/"/g,'');
        program.push({ op:'LCD_PRINT', args:[text]}); continue;
      }
      if (line.startsWith('delay_ms')) {
        const n = parseInt(line.match(/delay_ms\((\d+)\)/)[1]);
        program.push({ op:'DELAY', args:[n]}); continue;
      }
      if (line.startsWith('if(')) {
        const m = line.match(/if\((\w+)\s*==\s*'(.)'\)/);
        if (m) {
          const v = m[1], ch = m[2].charCodeAt(0);
          const lbl = '__if_' + program.length;
          program.push({ op:'EQ', args:['__cond', v, ch]});
          program.push({ op:'JZ', args:['__cond', lbl]});
          labels[lbl] = -1;
        }
        continue;
      }
      if (line.startsWith('else')) {
        const lblEnd = '__ifend_' + program.length;
        program.push({ op:'JMP', args:[lblEnd]});
        const previousIf = Object.keys(labels).reverse().find(k => labels[k] === -1);
        labels[previousIf] = program.length;
        labels[lblEnd] = -1;
        continue;
      }
      if (line === '}' || line === '};') {
        const pending = Object.keys(labels).reverse().find(k => labels[k] === -1);
        if (pending) labels[pending] = program.length;
      }
      if (line.includes('=')) {
        const [left,right] = line.replace(';','').split('=').map(s=>s.trim());
        if (right.includes('+')) {
          const [a,b] = right.split('+').map(s=>s.trim());
          program.push({ op:'ADD', args:[left,a,b]});
        } else {
          program.push({ op:'SET', args:[left, isNaN(parseInt(right)) ? right : parseInt(right)]});
        }
      }
    }

    program.unshift({ op:'LABEL', args:['__loop_start'] });
    labels['__loop_start'] = 0;
    for (let i=0;i<program.length;i++) if (program[i].op === 'LABEL') labels[program[i].args[0]] = i;
    return { program, labels };
  }
}

class DebuggerPanel {
  constructor(cpu, io, mem) { this.cpu = cpu; this.io = io; this.mem = mem; }
  render() {
    regTable.innerHTML = '<tr><th>Reg</th><th>Val</th></tr>' + [...this.cpu.reg].map((v,i)=>`<tr><td>R${i}</td><td>${v}</td></tr>`).join('');
    pinTable.innerHTML = '<tr><th>Pin</th><th>M</th><th>V</th></tr>' + this.io.pins.map((p,i)=>`<tr><td>${i}</td><td>${p.mode?'OUT':'IN'}</td><td>${p.value}</td></tr>`).join('');
    memTable.innerHTML = '<tr><th>Addr</th><th>Val</th></tr>' + [...this.mem.ram.slice(0,64)].map((v,i)=>`<tr><td>${i}</td><td>${v}</td></tr>`).join('');
    pcText.textContent = `PC: ${this.cpu.pc}`;
  }
}

const memory = new MemoryManager();
const pinIO = new PinIOSystem();
const interrupts = new InterruptController();
const runtime = new RuntimeScheduler();
const cpu = new CPUEmulator(memory, pinIO, interrupts, runtime);
const compiler = new CCompiler();
const keypad = new KeypadDriver(pinIO, interrupts);
const displayDriver = new SevenSegmentDisplayDriver(pinIO);
const debuggerPanel = new DebuggerPanel(cpu, pinIO, memory);

const SEG_MAP = {
  '0': 0b00111111, '1': 0b00000110, '2': 0b01011011, '3': 0b01001111,
  '4': 0b01100110, '5': 0b01101101, '6': 0b01111101, '7': 0b00000111,
  '8': 0b01111111, '9': 0b01101111, 'A': 0b01110111, 'b': 0b01111100,
  'C': 0b00111001, 'd': 0b01011110, 'E': 0b01111001, 'F': 0b01110001,
  '-': 0b01000000, ' ': 0b00000000, 'O':0b00111111, 'K':0b01110110, 'I':0b00000110, 'N':0b00110111, 'T':0b01111000
};

const hardwareApi = {
  lcdBuffer: '    ',
  lcdInit() { this.lcdBuffer = '    '; },
  lcdPrint(text) { this.lcdBuffer = (text + '    ').slice(0,4); log(`LCD: ${this.lcdBuffer}`); }
};

function renderDisplay() {
  const wrap = document.getElementById('sevenDisplay');
  if (!wrap.dataset.built) {
    for (let i=0;i<4;i++) {
      const d = document.createElement('div'); d.className='digit';
      for (const s of ['a','b','c','d','e','f','g','dp']) { const el = document.createElement('div'); el.className=`seg ${s}`; d.appendChild(el); }
      wrap.appendChild(d);
    }
    wrap.dataset.built = '1';
  }
  const chars = hardwareApi.lcdBuffer.split('');
  chars.forEach((ch,i) => displayDriver.setDigitMask(i, SEG_MAP[ch] ?? 0));
  [...wrap.children].forEach((digitEl,i) => {
    const mask = displayDriver.buffer[i] || 0;
    [...digitEl.children].forEach((seg,j)=> seg.classList.toggle('on', !!(mask & (1<<j))));
  });
}

function setupKeypadUI() {
  const keys = ['1','2','3','4','5','6','7','8','9','*','0','#'];
  const pad = document.getElementById('keypad');
  keys.forEach(k => {
    const b = document.createElement('button'); b.textContent = k;
    b.onmousedown = b.ontouchstart = () => keypad.press(k);
    b.onmouseup = b.onmouseleave = b.ontouchend = () => keypad.release();
    pad.appendChild(b);
  });
}

let runTimer = null;
function runLoop() {
  const hz = Number(hzInput.value) || 100;
  const tick = Number(tickInput.value) || 16;
  const stepsPerTick = Math.max(1, Math.floor(hz * tick / 1000));
  if (cpu.delayUntil && performance.now() < cpu.delayUntil) return;
  keypad.scan();
  runtime.tick(tick);
  for (let i=0;i<stepsPerTick;i++) cpu.step();
  debuggerPanel.render();
  renderDisplay();
}

function compileCode() {
  try {
    const { program, labels } = compiler.compile(codeEditor.value);
    cpu.loadProgram(program); cpu.labels = labels; cpu.reset();
    statusText.textContent = `Compilado: ${program.length} instrucciones.`;
    log('Compile OK');
  } catch (e) { statusText.textContent = 'Error compilando: ' + e.message; log('Compile error ' + e.message); }
}

function log(msg) { consoleEl.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`; consoleEl.scrollTop = consoleEl.scrollHeight; }

compileBtn.onclick = compileCode;
runBtn.onclick = () => { if (runTimer) clearInterval(runTimer); runTimer = setInterval(runLoop, Number(tickInput.value) || 16); statusText.textContent = 'Running...'; };
stopBtn.onclick = () => { clearInterval(runTimer); runTimer = null; statusText.textContent='Stopped.'; };
stepBtn.onclick = () => { runLoop(); statusText.textContent='Step ejecutado.'; };
resetBtn.onclick = () => { cpu.reset(); memory.resetRAM(); hardwareApi.lcdInit(); debuggerPanel.render(); renderDisplay(); statusText.textContent='Reset OK'; };

const regTable = document.getElementById('regTable');
const pinTable = document.getElementById('pinTable');
const memTable = document.getElementById('memTable');
const pcText = document.getElementById('pcText');
const statusText = document.getElementById('statusText');
const codeEditor = document.getElementById('codeEditor');
const consoleEl = document.getElementById('console');
const hzInput = document.getElementById('hzInput');
const tickInput = document.getElementById('tickInput');
const compileBtn = document.getElementById('compileBtn');
const runBtn = document.getElementById('runBtn');
const stopBtn = document.getElementById('stopBtn');
const stepBtn = document.getElementById('stepBtn');
const resetBtn = document.getElementById('resetBtn');

setupKeypadUI();
hardwareApi.lcdInit();
compileCode();
debuggerPanel.render();
renderDisplay();
</script>
</body>
</html>
