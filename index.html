<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>LCD Terminal OS</title>
<style>
:root{--bg:#04070a;--on:#39ff72;--off:#2b3440;--w:30px;--h:52px;--t:4px;--gap:3px}
*{box-sizing:border-box}body{margin:0;background:radial-gradient(#0a1018,#04070a);color:#bafcca;font-family:Consolas,monospace;height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{width:min(1400px,97vw);height:min(900px,96vh);background:#060b12;border:1px solid #243041;border-radius:10px;display:grid;grid-template-rows:auto auto 1fr auto;padding:10px;gap:8px}
.head{color:#8ea2b6;font-size:13px}.kb{background:#0d1420;color:#bafcca;border:1px solid #2b3950;border-radius:6px;padding:6px 9px;width:fit-content}
.display{border:1px solid #273344;border-radius:10px;padding:12px;background:#02050a;display:grid;place-items:center;overflow:auto}.grid{display:grid;grid-template-columns:repeat(32,var(--w));grid-template-rows:repeat(12,var(--h));gap:var(--gap)}
.cell{width:var(--w);height:var(--h);display:grid;grid-template-columns:var(--t) 1fr var(--t);grid-template-rows:var(--t) 1fr var(--t) 1fr var(--t);background:#0a1018;border-radius:4px;padding:1px}.seg{background:var(--off);opacity:.32;border-radius:5px}.on{background:var(--on);opacity:.98;box-shadow:0 0 3px var(--on),0 0 9px color-mix(in srgb,var(--on) 70%,transparent)}
.a{grid-column:2;grid-row:1}.b{grid-column:3;grid-row:2}.c{grid-column:3;grid-row:4}.d{grid-column:2;grid-row:5}.e{grid-column:1;grid-row:4}.f{grid-column:1;grid-row:2}.g{grid-column:2;grid-row:3}
.foot{border:1px solid #273344;border-radius:8px;background:#050a10;padding:8px;min-height:110px;max-height:200px;overflow:auto;white-space:pre-wrap;color:#9cb3c8}
</style></head><body><div class='wrap'><div class='head' id='head'></div><button class='kb' id='kbBtn'>Activar teclado móvil</button><div class='display'><div class='grid' id='grid'></div></div><div class='foot' id='log'></div></div>
<script>
(()=>{
const W=32,H=12,grid=document.getElementById('grid'),logEl=document.getElementById('log'),head=document.getElementById('head'),kbBtn=document.getElementById('kbBtn');
const SEG={'0':'abcdef','1':'bc','2':'abdeg','3':'abcdg','4':'bcfg','5':'acdfg','6':'acdefg','7':'abc','8':'abcdefg','9':'abcdfg','A':'abcefg','B':'cdefg','C':'adef','D':'bcdeg','E':'adefg','F':'aefg','G':'acdef','H':'bcefg','I':'bc','J':'bcde','K':'efg','L':'def','M':'abcef','N':'abcef','O':'abcdef','P':'abefg','Q':'abcfg','R':'efg','S':'acdfg','T':'defg','U':'bcdef','V':'cde','W':'bcdef','X':'bcefg','Y':'bcdfg','Z':'abdeg','-':'g','_':''};
const cells=[],buf=Array.from({length:H},()=>Array(W).fill('_'));let c={x:0,y:0},running=false,stop=false,speed=1,vars={};
let mobile=document.createElement('input');mobile.style.position='fixed';mobile.style.opacity='0';document.body.appendChild(mobile);
const FSKEY='lcd.fs.v3';let fs={'/home/boot.seg':'CLS\nPRINT LCD_OS_READY\nPRINT TYPE_HELP','/home/counter.seg':'VAR N=0\nL: PRINT ${N}\nSLEEP 120\nCLS\nADD N 1\nIF N==100 THEN GOTO E\nGOTO L\nE: PRINT DONE','/home/net.seg':'NETJSON https://api.github.com/zen\nPRINT NET_OK'};
function saveFS(){localStorage.setItem(FSKEY,JSON.stringify(fs))}function loadFS(){try{const d=JSON.parse(localStorage.getItem(FSKEY));if(d)fs=d}catch{}}
function log(t){logEl.textContent+=t+'\n';logEl.scrollTop=logEl.scrollHeight}
function init(){const f=document.createDocumentFragment();for(let i=0;i<W*H;i++){const d=document.createElement('div');d.className='cell';const m={};for(const s of 'abcdefg'){const p=document.createElement('div');p.className='seg '+s;m[s]=p;d.appendChild(p)}cells.push(m);f.appendChild(d)}grid.appendChild(f)}
const id=(x,y)=>y*W+x; function draw(x,y,ch){if(x<0||x>=W||y<0||y>=H)return;ch=(ch||'_').toUpperCase();if(buf[y][x]===ch)return;buf[y][x]=ch;const M=cells[id(x,y)],segs=SEG[ch]||'';for(const s of 'abcdefg'){const on=segs.includes(s);M[s].classList.toggle('on',on);M[s].style.filter=on?`brightness(${0.88+Math.random()*0.20})`:''}}
function cls(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)draw(x,y,'_');c={x:0,y:0}} function nl(){c.x=0;c.y++;if(c.y>=H){for(let y=1;y<H;y++)for(let x=0;x<W;x++)draw(x,y-1,buf[y][x]);for(let x=0;x<W;x++)draw(x,H-1,'_');c.y=H-1}} function print(t){for(const r of String(t)){if(r==='\n'){nl();continue}draw(c.x,c.y,r===' '?'_':r);c.x++;if(c.x>=W)nl()}}
const wait=ms=>new Promise(r=>setTimeout(r,ms/Math.max(.1,speed))); let actx; function beep(f=440,d=120){actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;g.gain.value=.05;o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d/1000)}
function parse(src){return src.split(/\r?\n/).map((l,n)=>({l:l.trim(),n:n+1})).filter(x=>x.l&&!x.l.startsWith('#'))}
function ex(s){return s.replace(/\$\{(\w+)\}/g,(_,k)=>vars[k]??'0')} function num(v){return isNaN(+v)?v:+v} function tst(cnd){const m=cnd.match(/^(\w+)\s*(==|!=|>=|<=|>|<)\s*(\S+)$/);if(!m)return false;const a=num(vars[m[1]]??0),b=num(ex(m[3]));return m[2]=='=='?a==b:m[2]=='!='?a!=b:m[2]=='>='?a>=b:m[2]=='<='?a<=b:m[2]=='>'?a>b:a<b}
async function exec(src){const q=parse(src);running=true;stop=false;for(let pc=0;running&&pc<q.length;pc++){if(stop)break;const line=q[pc].l,U=line.toUpperCase();head.textContent=`LCD-OS ${W}x${H} L${q[pc].n}: ${line}`;
if(U==='HELP'){print('CMDS:HELP CLS PRINT SET SLEEP BEEP SCROLL GOTO IF VAR ADD SUB MUL DIV MOD INC DEC DATE TIME RAND INPUT COLOR SPEED MAP DUMP LS CAT WRITE APPEND DEL REN CP MV RUN REBOOT NETGET NETJSON PING SYSINFO')}
else if(U==='CLS')cls(); else if(U.startsWith('PRINT '))print(ex(line.slice(6))); else if(U.startsWith('SET ')){const[,x,y,ch]=line.split(/\s+/);draw(+x,+y,ch||'_')} else if(U.startsWith('SLEEP '))await wait(+line.split(/\s+/)[1]||0); else if(U.startsWith('BEEP ')){const[,f,d]=line.split(/\s+/);beep(+f||440,+d||100)}
else if(U.startsWith('SCROLL ')){const t=ex(line.slice(7));for(let i=0;i<t.length+W;i++){for(let y=0;y<H;y++)for(let x=0;x<W-1;x++)draw(x,y,buf[y][x+1]);draw(W-1,0,t[i]||'_');await wait(55)}} else if(U.startsWith('GOTO ')){const L=line.slice(5).trim()+':';const at=q.findIndex(e=>e.l.toUpperCase()===L.toUpperCase());if(at>=0){pc=at;continue}}
else if(U.startsWith('IF ')&&U.includes(' THEN ')){const [co,th]=line.slice(3).split(/\s+THEN\s+/i);if(tst(co))q.splice(pc+1,0,{l:th,n:q[pc].n})} else if(U.startsWith('VAR ')){const m=line.match(/^VAR\s+(\w+)\s*=\s*(.+)$/i);if(m)vars[m[1]]=num(ex(m[2]))}
else if(U.startsWith('ADD ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)+(+ex(v)||0)} else if(U.startsWith('SUB ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)-(+ex(v)||0)} else if(U.startsWith('MUL ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)*(+ex(v)||0)}
else if(U.startsWith('DIV ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)/(+ex(v)||1)} else if(U.startsWith('MOD ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)%(+ex(v)||1)} else if(U.startsWith('INC ')){const k=line.split(/\s+/)[1];vars[k]=(+vars[k]||0)+1} else if(U.startsWith('DEC ')){const k=line.split(/\s+/)[1];vars[k]=(+vars[k]||0)-1}
else if(U==='DATE')print(new Date().toISOString().slice(0,10).replace(/-/g,'')); else if(U==='TIME')print(new Date().toISOString().slice(11,19).replace(/:/g,'')); else if(U.startsWith('RAND ')){const[,k,a,b]=line.split(/\s+/);vars[k]=Math.floor((+a||0)+Math.random()*((+b||9)-(+a||0)+1))}
else if(U.startsWith('INPUT ')){const k=line.split(/\s+/)[1];vars[k]=await readLine(`INPUT ${k}> `)} else if(U.startsWith('COLOR ')){document.documentElement.style.setProperty('--on',line.split(/\s+/)[1]||'#39ff72')} else if(U.startsWith('SPEED ')){speed=Math.max(.1,+line.split(/\s+/)[1]||1)} else if(U.startsWith('MAP ')){const[,ch,se]=line.split(/\s+/);if(ch&&se)SEG[ch.toUpperCase()]=se.toLowerCase().replace(/[^a-g]/g,'')}
else if(U==='DUMP')log(JSON.stringify(vars,null,2)); else if(U.startsWith('LS')){const p=line.split(/\s+/)[1]||'/';log(Object.keys(fs).filter(k=>k.startsWith(p)).join('\n')||'[vacio]')} else if(U.startsWith('CAT ')){const p=line.slice(4).trim();log(fs[p]??'[no existe]')}
else if(U.startsWith('WRITE ')){const m=line.match(/^WRITE\s+(\S+)\s+(.+)$/i);if(m){fs[m[1]]=ex(m[2]).replaceAll('\\n','\n');saveFS();log('ok')}} else if(U.startsWith('APPEND ')){const m=line.match(/^APPEND\s+(\S+)\s+(.+)$/i);if(m){fs[m[1]]=(fs[m[1]]||'')+ex(m[2]).replaceAll('\\n','\n');saveFS();log('ok')}}
else if(U.startsWith('DEL ')){const p=line.slice(4).trim();delete fs[p];saveFS();log('deleted')} else if(U.startsWith('REN ')){const[,a,b]=line.split(/\s+/);if(fs[a]!=null){fs[b]=fs[a];delete fs[a];saveFS()}} else if(U.startsWith('CP ')){const[,a,b]=line.split(/\s+/);if(fs[a]!=null){fs[b]=fs[a];saveFS()}} else if(U.startsWith('MV ')){const[,a,b]=line.split(/\s+/);if(fs[a]!=null){fs[b]=fs[a];delete fs[a];saveFS()}}
else if(U.startsWith('RUN ')){const p=line.slice(4).trim();if(fs[p])await exec(fs[p]);else log('no file')} else if(U.startsWith('PING ')){const t=performance.now();try{await fetch(line.slice(5).trim())}catch{}log('pong '+Math.round(performance.now()-t)+'ms')} else if(U.startsWith('NETGET ')){try{const r=await fetch(line.slice(7).trim());log((await r.text()).slice(0,500))}catch{log('net err')}} else if(U.startsWith('NETJSON ')){try{const r=await fetch(line.slice(8).trim());log(JSON.stringify(await r.json()).slice(0,800))}catch{log('json err')}} else if(U==='SYSINFO'){log(`grid=${W}x${H} speed=${speed} vars=${Object.keys(vars).length} files=${Object.keys(fs).length}`)}
else if(U==='REBOOT'){vars={};cls();await wait(100);if(fs['/home/boot.seg'])await exec(fs['/home/boot.seg'])}
await wait(8)}running=false;head.textContent='LCD-OS listo'}
let inputMode=null;function readLine(prompt){return new Promise(res=>{log(prompt);inputMode={buf:'',done:res,prompt};head.textContent=prompt})}
window.addEventListener('keydown',async e=>{if(inputMode){if(e.key==='Enter'){const v=inputMode.buf;inputMode.done(v);inputMode=null;log(v);return}else if(e.key==='Backspace'){inputMode.buf=inputMode.buf.slice(0,-1);head.textContent=inputMode.prompt+inputMode.buf;return}else if(e.key.length===1){inputMode.buf+=e.key.toUpperCase();head.textContent=inputMode.prompt+inputMode.buf;return}}
if(e.key==='F10'){e.preventDefault();stop=true;running=false;log('stop')} if(e.key==='F5'){e.preventDefault();stop=true;running=false;vars={};cls();log('reset')} if(e.key==='F9'){e.preventDefault();if(!running){const r=await readLine('RUN FILE> ');if(fs[r])exec(fs[r]);else exec(r)}}
if(e.key.length===1&&!running){window.cli=(window.cli||'')+e.key;head.textContent='> '+window.cli} if(e.key==='Backspace'&&!running){window.cli=(window.cli||'').slice(0,-1);head.textContent='> '+window.cli} if(e.key==='Enter'&&!running&&window.cli){const cmd=window.cli.trim();window.cli='';if(cmd)exec(cmd)}});
kbBtn.onclick=()=>{mobile.focus();log('teclado móvil activado')};mobile.addEventListener('input',e=>{if(!e.target.value)return;window.cli=(window.cli||'')+e.target.value;head.textContent='> '+window.cli;e.target.value=''});
loadFS();init();cls();log('Terminal emulada lista. Enter=ejecuta, F9=run, F10=stop, F5=reset, HELP comandos + internet');if(fs['/home/boot.seg'])exec(fs['/home/boot.seg']);
})();
</script></body></html>
