<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>LCD Terminal</title>
<style>
:root{--on:#39ff72;--off:#26303a;--bg:#05090f;--w:28px;--h:46px;--t:4px;--g:2px}*{box-sizing:border-box}
body{margin:0;background:#02050a;display:flex;justify-content:center;align-items:center;height:100vh;font-family:Consolas,monospace}
.wrap{width:min(1360px,98vw);height:min(880px,98vh);display:grid;grid-template-rows:auto 1fr;gap:8px}
#kbBtn{background:#0d1420;color:#bafcca;border:1px solid #2b3950;border-radius:6px;padding:6px 10px;width:fit-content}
.display{border:1px solid #2b3950;border-radius:10px;padding:10px;background:var(--bg);display:grid;place-items:center;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(32,var(--w));grid-template-rows:repeat(12,var(--h));gap:var(--g)}
.cell{width:var(--w);height:var(--h);display:grid;grid-template-columns:var(--t) 1fr var(--t);grid-template-rows:var(--t) 1fr var(--t) 1fr var(--t);background:#0c1219;border-radius:3px;padding:1px}
.seg{background:var(--off);opacity:.45;border-radius:4px}.on{background:var(--on);opacity:.95;box-shadow:0 0 3px var(--on)}
.a{grid-column:2;grid-row:1}.b{grid-column:3;grid-row:2}.c{grid-column:3;grid-row:4}.d{grid-column:2;grid-row:5}.e{grid-column:1;grid-row:4}.f{grid-column:1;grid-row:2}.g{grid-column:2;grid-row:3}
</style></head><body><div class='wrap'><button id='kbBtn'>Activar teclado</button><div class='display'><div class='grid' id='grid'></div></div></div>
<script>
(()=>{
const W=32,H=12,grid=document.getElementById('grid'),kbBtn=document.getElementById('kbBtn');
const SEG={'0':'abcdef','1':'bc','2':'abdeg','3':'abcdg','4':'bcfg','5':'acdfg','6':'acdefg','7':'abc','8':'abcdefg','9':'abcdfg','A':'abcefg','B':'cdefg','C':'adef','D':'bcdeg','E':'adefg','F':'aefg','G':'acdef','H':'bcefg','I':'bc','J':'bcde','K':'efg','L':'def','M':'abcef','N':'abcef','O':'abcdef','P':'abefg','Q':'abcfg','R':'efg','S':'acdfg','T':'defg','U':'bcdef','V':'cde','W':'bcdef','X':'bcefg','Y':'bcdfg','Z':'abdeg','-':'g','_':'',' ':''};
const cells=[],buf=Array.from({length:H},()=>Array(W).fill('_')); let cur={x:0,y:0},running=false,stop=false,speed=1,vars={},cwd='/home',cli='';
let blink=true,cursorPainted=false,cursorPrev='_',cursorPos={x:0,y:0};
const FSKEY='lcd.fs.v7'; let fs={'/home/boot.seg':'CLS\nPRINT LCD_READY\nPRINT HELP','/home/demo.seg':'VAR N=0\nL:\nPRINT ${N}\nSLEEP 100\nCLS\nADD N 1\nIF N<20 THEN GOTO L\nPRINT END','/home/test.lc':'PRINT HELLO\nPRINT WORLD'};
const mobile=document.createElement('input'); mobile.style.position='fixed'; mobile.style.opacity='0'; document.body.appendChild(mobile);
function rpath(p){if(!p)return cwd;return p.startsWith('/')?p:(cwd+'/'+p).replace(/\/+/g,'/')}
function saveFS(){localStorage.setItem(FSKEY,JSON.stringify(fs))} function loadFS(){try{const d=JSON.parse(localStorage.getItem(FSKEY));if(d)fs=d}catch{}}
function init(){const f=document.createDocumentFragment();for(let i=0;i<W*H;i++){const c=document.createElement('div');c.className='cell';const m={};for(const s of 'abcdefg'){const e=document.createElement('div');e.className='seg '+s;m[s]=e;c.appendChild(e)}cells.push(m);f.appendChild(c)}grid.appendChild(f)}
const id=(x,y)=>y*W+x; function draw(x,y,ch){if(x<0||x>=W||y<0||y>=H)return; ch=(ch||'_').toUpperCase(); if(buf[y][x]===ch)return; buf[y][x]=ch; const seg=SEG[ch]??''; const m=cells[id(x,y)]; for(const s of 'abcdefg')m[s].classList.toggle('on',seg.includes(s));}
function hideCursor(){if(cursorPainted){draw(cursorPos.x,cursorPos.y,cursorPrev);cursorPainted=false}}
function showCursor(){if(running)return;hideCursor();cursorPos={x:cur.x,y:cur.y};cursorPrev=buf[cur.y]?.[cur.x]??'_'; if(blink){draw(cur.x,cur.y,'-');cursorPainted=true}}
function cls(){hideCursor();for(let y=0;y<H;y++)for(let x=0;x<W;x++)draw(x,y,'_');cur={x:0,y:0};showCursor()}
function nl(){cur.x=0;cur.y++;if(cur.y>=H){for(let y=1;y<H;y++)for(let x=0;x<W;x++)draw(x,y-1,buf[y][x]);for(let x=0;x<W;x++)draw(x,H-1,'_');cur.y=H-1}}
function print(t){hideCursor();for(const r of String(t)){if(r==='\n'){nl();continue}draw(cur.x,cur.y,r===' '?'_':r);cur.x++;if(cur.x>=W)nl()}showCursor()}
const wait=ms=>new Promise(r=>setTimeout(r,ms/Math.max(.1,speed))); let actx; function beep(f=440,d=100){actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.value=f;g.gain.value=.04;o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+d/1000)}
function parse(src){return src.split(/\r?\n/).map((l,n)=>({l:l.trim(),n:n+1})).filter(x=>x.l && !x.l.startsWith('#'))}
function ex(s){return String(s).replace(/\$\{(\w+)\}/g,(_,k)=>vars[k]??'0')} function n(v){return isNaN(+v)?v:+v}
function tst(c){const m=c.match(/^(\w+)\s*(==|!=|>=|<=|>|<)\s*(\S+)$/); if(!m)return false; const a=n(vars[m[1]]??0),b=n(ex(m[3])); return m[2]=='=='?a==b:m[2]=='!='?a!=b:m[2]=='>='?a>=b:m[2]=='<='?a<=b:m[2]=='>'?a>b:a<b}
async function exec(src){const q=parse(src);running=true;stop=false;for(let pc=0;pc<q.length&&!stop;pc++){const line=q[pc].l,U=line.toUpperCase();
if(U==='HELP')print('PRINT CLS VAR ADD SUB MUL DIV IF GOTO RUN LS CAT WRITE APPEND DEL CD MKDIR TOUCH EDIT COMPILE SLEEP BEEP');
else if(U==='CLS')cls();
else if(U.startsWith('PRINT '))print(ex(line.slice(6)));
else if(U.startsWith('VAR ')){const m=line.match(/^VAR\s+(\w+)\s*=\s*(.+)$/i);if(m)vars[m[1]]=n(ex(m[2]))}
else if(U.startsWith('ADD ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)+(+ex(v)||0)}
else if(U.startsWith('SUB ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)-(+ex(v)||0)}
else if(U.startsWith('MUL ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)*(+ex(v)||0)}
else if(U.startsWith('DIV ')){const[,k,v]=line.split(/\s+/);vars[k]=(+vars[k]||0)/(+ex(v)||1)}
else if(U.startsWith('IF ')&&U.includes(' THEN ')){const [c,t]=line.slice(3).split(/\s+THEN\s+/i);if(tst(c))q.splice(pc+1,0,{l:t,n:q[pc].n})}
else if(U.startsWith('GOTO ')){const L=line.slice(5).trim()+':';const at=q.findIndex(e=>e.l.toUpperCase()===L.toUpperCase());if(at>=0){pc=at;continue}}
else if(U.startsWith('SLEEP '))await wait(+line.split(/\s+/)[1]||0);
else if(U.startsWith('BEEP ')){const[,f,d]=line.split(/\s+/);beep(+f||440,+d||100)}
else if(U.startsWith('CD ')){cwd=rpath(line.slice(3).trim());print('CD '+cwd)}
else if(U.startsWith('MKDIR ')){const d=rpath(line.slice(6).trim()).replace(/\/$/,'');fs[d+'/.dir']='';saveFS();print('OK')}
else if(U.startsWith('TOUCH ')){const f=rpath(line.slice(6).trim());if(!(f in fs))fs[f]='';saveFS();print('OK')}
else if(U.startsWith('EDIT ')){const f=rpath(line.slice(5).trim());print('EDIT '+f);const t=await readLine();fs[f]=(fs[f]||'')+t;saveFS();print('SAVED')}
else if(U.startsWith('COMPILE ')){const f=rpath(line.slice(8).trim());if(fs[f]){const out=f.replace(/\.lc$/i,'.bin');fs[out]=fs[f].split('\n').map(x=>x.trim()).join(';');saveFS();print('BIN '+out)}else print('NOFILE')}
else if(U.startsWith('LS')){const p=rpath(line.split(/\s+/)[1]||cwd);print(Object.keys(fs).filter(k=>k.startsWith(p)).slice(0,20).join(' '))}
else if(U.startsWith('CAT ')){const p=rpath(line.slice(4).trim());print((fs[p]||'NOFILE').slice(0,120))}
else if(U.startsWith('WRITE ')){const m=line.match(/^WRITE\s+(\S+)\s+(.+)$/i);if(m){fs[rpath(m[1])]=ex(m[2]).replaceAll('\\n','\n');saveFS();print('OK')}}
else if(U.startsWith('APPEND ')){const m=line.match(/^APPEND\s+(\S+)\s+(.+)$/i);if(m){const f=rpath(m[1]);fs[f]=(fs[f]||'')+ex(m[2]).replaceAll('\\n','\n');saveFS();print('OK')}}
else if(U.startsWith('DEL ')){delete fs[rpath(line.slice(4).trim())];saveFS();print('OK')}
else if(U.startsWith('RUN ')){const p=rpath(line.slice(4).trim());if(fs[p])await exec(fs[p]);else print('NOFILE')}
await wait(6)}running=false;showCursor()}
function readLine(){return new Promise(res=>inputMode={buf:'',done:res})} let inputMode=null;
setInterval(()=>{blink=!blink;showCursor()},380);
window.addEventListener('keydown',async e=>{hideCursor();if(inputMode){if(e.key==='Enter'){const v=inputMode.buf;inputMode.done(v);inputMode=null;showCursor();return} if(e.key==='Backspace'){inputMode.buf=inputMode.buf.slice(0,-1);showCursor();return} if(e.key.length===1){inputMode.buf+=e.key.toUpperCase();showCursor();return}}
if(e.key==='F10'){stop=true;running=false;showCursor();return} if(e.key==='F5'){stop=true;running=false;vars={};cls();return}
if(e.key.length===1&&!running){cli+=e.key;print(e.key)} if(e.key==='Backspace'&&!running){cli=cli.slice(0,-1);cur.x=Math.max(0,cur.x-1);draw(cur.x,cur.y,'_')} if(e.key==='Enter'&&!running&&cli){const cmd=cli.trim();cli='';nl();if(cmd)await exec(cmd)} showCursor();});
kbBtn.onclick=()=>mobile.focus(); mobile.addEventListener('input',e=>{if(!e.target.value)return;hideCursor();cli+=e.target.value;print(e.target.value);e.target.value='';showCursor()});
loadFS();init();cls(); if(fs['/home/boot.seg'])exec(fs['/home/boot.seg']);
})();
</script></body></html>
