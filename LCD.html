<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entorno Embebido 7 Segmentos + MCU</title>
<style>
body { font-family: sans-serif; background:#111; color:#eee; text-align:center; padding:20px; }
.screen-container { border:1px solid #444; padding:10px; margin:10px 0; background:#222; border-radius:8px; }
.display-row{display:flex; justify-content:center; flex-wrap:wrap; margin:10px 0;}
.display{position:relative; width:50px; height:100px; margin:5px; cursor:pointer;}
.segment{position:absolute; background:#333; border-radius:5px; transition:0.2s;}
.segment.on{background:#0f0;}
.a{top:0; left:10px; width:30px; height:8px;}
.b{top:8px; right:0; width:8px; height:38px;}
.c{bottom:8px; right:0; width:8px; height:38px;}
.d{bottom:0; left:10px; width:30px; height:8px;}
.e{bottom:8px; left:0; width:8px; height:38px;}
.f{top:8px; left:0; width:8px; height:38px;}
.g{top:46px; left:10px; width:30px; height:8px;}
button{margin:2px;}
input[type=range]{width:200px;}
.ide-grid{display:grid;grid-template-columns:2fr 1fr;gap:12px;max-width:1200px;margin:20px auto;text-align:left;}
.panel{background:#1b1b1b;border:1px solid #444;border-radius:8px;padding:10px;}
textarea{width:100%;min-height:280px;background:#0f0f0f;color:#d6ffd6;border:1px solid #444;padding:8px;font-family:monospace;}
pre{background:#0f0f0f;color:#ccc;padding:8px;min-height:90px;overflow:auto;}
.keypad{display:grid;grid-template-columns:repeat(3,46px);gap:6px;justify-content:center;}
.key{background:#333;border:1px solid #666;color:#fff;padding:8px;text-align:center;user-select:none;cursor:pointer;}
.key.active{background:#555;}
.hw-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;}
</style>
</head>
<body>
<h1>Entorno MCU + 7 Segmentos</h1>
<button id="addScreenBtn">Agregar Pantalla</button>
<button id="compileAllBtn">Compilar y Ejecutar (Todas)</button>
<div id="allScreens"></div>

<div class="ide-grid">
  <div class="panel">
    <h3>Editor C embebido</h3>
    <textarea id="codeEditor">int counter = 0;
void loop(){
  lcd_print(counter);
  counter = counter + 1;
  if(counter > 999){ counter = 0; }
  delay(150);
}</textarea>
    <button id="compileRunBtn">Compilar y Ejecutar</button>
    <button id="pauseBtn">Pause</button>
    <button id="stepBtn">Step</button>
    <label>Velocidad <input id="speed" type="range" min="1" max="20" value="6"></label>
    <pre id="console"></pre>
  </div>
  <div class="panel">
    <h3>Hardware + Debugger</h3>
    <div class="hw-grid">
      <div><strong>Registros</strong><pre id="regs"></pre></div>
      <div><strong>Memoria (0..63)</strong><pre id="mem"></pre></div>
      <div><strong>Pines</strong><pre id="pins"></pre></div>
      <div><strong>Teclado matricial</strong>
        <div class="keypad" id="keypad"></div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
const SEG_ORDER=['a','b','c','d','e','f','g'];
const defaultSegments={ '0':['a','b','c','d','e','f'],'1':['b','c'],'2':['a','b','g','e','d'],'3':['a','b','g','c','d'],'4':['f','g','b','c'],'5':['a','f','g','c','d'],'6':['a','f','g','c','d','e'],'7':['a','b','c'],'8':['a','b','c','d','e','f','g'],'9':['a','b','c','d','f','g'],'A':['a','b','c','e','f','g'],'B':['c','d','e','f','g'],'C':['a','d','e','f'],'D':['b','c','d','e','g'],'E':['a','d','e','f','g'],'F':['a','e','f','g'],'G':['a','c','d','e','f'],'H':['b','c','e','f','g'],'I':['b','c'],'J':['b','c','d'],'L':['d','e','f'],'O':['a','b','c','d','e','f'],'P':['a','b','e','f','g'],'S':['a','c','d','f','g'],'U':['b','c','d','e','f'],'-':['g'],'_':['d'],':':['b','c'],' ':[]};

class Memory{constructor(size=512){this.ram=new Uint16Array(size);}read(a){return this.ram[a]|0;}write(a,v){this.ram[a]=v&0xffff;}}
class PinController{constructor(n=80){this.pins=Array.from({length:n},()=>({mode:'INPUT',value:0}));}pinMode(p,m){this.pins[p].mode=m;}digitalWrite(p,v){if(this.pins[p]) this.pins[p].value=v?1:0;}digitalRead(p){return this.pins[p]?this.pins[p].value:0;}dump(){return this.pins.map((p,i)=>`${i}:${p.mode[0]}=${p.value}`).slice(0,48).join(' ');}}
class CPUEmulator{constructor(mem,pin){this.mem=mem;this.pin=pin;this.reset();}reset(){this.regs=new Int32Array(8);this.pc=0;this.sp=500;this.stack=[];this.program=[];this.running=false;}load(program){this.reset();this.program=program;}step(api){if(this.pc<0||this.pc>=this.program.length){this.running=false;return;}const i=this.program[this.pc++];const R=this.regs;switch(i.op){case'LOAD':R[i.r]=i.v;break;case'STORE':this.mem.write(i.a,R[i.r]);break;case'ADD':R[i.r]+=R[i.r2];break;case'JMP':this.pc=i.to;break;case'JZ':if(R[i.r]===0)this.pc=i.to;break;case'CALL':this.stack.push(this.pc);this.pc=i.to;break;case'RET':this.pc=this.stack.pop()??this.program.length;break;case'API':api[i.fn](...(i.args||[]));break;}}}
class KeypadDriver{constructor(pin){this.pin=pin;this.rows=[40,41,42,43];this.cols=[44,45,46];this.map=[['1','2','3'],['4','5','6'],['7','8','9'],['*','0','#']];this.last='';this.lastAt=0;this.debounce=50;this.pressed=null;this.rows.forEach(r=>pin.pinMode(r,'OUTPUT'));this.cols.forEach(c=>pin.pinMode(c,'INPUT'));}
press(k){this.pressed=k;}release(){this.pressed=null;}scan(){const now=performance.now();for(let r=0;r<4;r++){this.rows.forEach((rp,idx)=>this.pin.digitalWrite(rp,idx===r?1:0));for(let c=0;c<3;c++){const key=this.map[r][c];const active=this.pressed===key?1:0;this.pin.digitalWrite(this.cols[c],active);if(active&&now-this.lastAt>this.debounce){this.last=key;this.lastAt=now;return key;}}}return '';}}
class DisplayEngine{
  constructor(pin){this.pin=pin;this.bindings=[];}
  attach(screen){const segmentPins=[2,3,4,5,6,7,8],digitPins=Array.from({length:screen.displays.length},(_,i)=>9+i+screen.id*10);this.bindings.push({screen,segmentPins,digitPins,index:0,last:performance.now()});segmentPins.forEach(p=>this.pin.pinMode(p,'OUTPUT'));digitPins.forEach(p=>this.pin.pinMode(p,'OUTPUT'));screen.segmentPins=segmentPins;screen.digitPins=digitPins;}
  applyCharToPins(screen,ch){const segs=screen.customChars[ch] ? SEG_ORDER.filter((s,i)=>screen.customChars[ch][i]) : (defaultSegments[ch?.toUpperCase()]||[]);SEG_ORDER.forEach((s,i)=>this.pin.digitalWrite(screen.segmentPins[i],segs.includes(s)?1:0));}
  refresh(){const now=performance.now();this.bindings.forEach(b=>{const s=b.screen;if(!s.displays.length) return;const delay=s.disableDigit.checked?999999:Math.max(1,parseInt(s.digitSlider.value)||2);if(now-b.last<delay) return;b.last=now;s.displays.forEach((d,i)=>this.pin.digitalWrite(s.digitPins[i],i===b.index?1:0));const text=s.inputText.value||'';const ch=text[b.index]||' ';this.applyCharToPins(s,ch);s.displays.forEach((d,i)=>{d.style.opacity=i===b.index?1:0.2;d.querySelectorAll('.segment').forEach(seg=>seg.classList.toggle('on', i===b.index && this.pin.digitalRead(s.segmentPins[SEG_ORDER.indexOf(seg.classList[1])])));});b.index=(b.index+1)%s.displays.length;});}
}
class CompilerC{compile(src){const p=[];src.split('\n').forEach(l=>{const s=l.trim();if(!s||s.startsWith('//')||s.startsWith('int ')||s.startsWith('void')) return;let m;if((m=s.match(/^lcd_print\((\w+)\)/))) p.push({op:'API',fn:'lcd_print',args:[m[1]]});else if((m=s.match(/^lcd_set_digit\((\d+)\s*,\s*'(.)'\)/))) p.push({op:'API',fn:'lcd_set_digit',args:[+m[1],m[2]]});else if((m=s.match(/^delay\((\d+)\)/))) p.push({op:'API',fn:'delay',args:[+m[1]]});else if((m=s.match(/^(\w+)\s*=\s*(\w+)\s*\+\s*(\d+)/))) p.push({op:'API',fn:'assign_add',args:[m[1],m[2],+m[3]]});else if((m=s.match(/^(\w+)\s*=\s*(\d+)/))) p.push({op:'API',fn:'assign',args:[m[1],+m[2]]});});p.push({op:'JMP',to:0});return p;}}
class RuntimeScheduler{constructor(cpu,display,keypad){this.cpu=cpu;this.display=display;this.keypad=keypad;this.vars={};this.pause=true;this.nextAt=0;this.speed=6;}tick(api){this.display.refresh();const now=performance.now();if(this.pause||now<this.nextAt) return;for(let i=0;i<this.speed;i++) this.cpu.step(api);}}
const pin=new PinController();const mem=new Memory();const cpu=new CPUEmulator(mem,pin);const keypad=new KeypadDriver(pin);const displayEngine=new DisplayEngine(pin);const compiler=new CompilerC();const runtime=new RuntimeScheduler(cpu,displayEngine,keypad);
const allScreens=document.getElementById('allScreens');let screenCount=0;
function createScreen(id){const container=document.createElement('div');container.classList.add('screen-container');container.innerHTML=`<h3>Pantalla ${id}</h3><div class="controls"><label>Texto: <input type="text" class="inputText" maxlength="15" value="123"></label><label>Ancho: <input type="number" class="screenWidth" min="1" max="15" value="3"></label><label>Multiplexion: <input type="number" class="multiplexLevel" min="1" max="10" value="1"></label><br><label>Delay dígito(ms): <input type="range" class="digitDelaySlider" min="0" max="100" value="2"><span class="digitDelayValue">2</span><input type="checkbox" class="disableDigitDelay"> Desactivar</label><button class="createBtn">Crear Pantalla</button><button class="incrementBtn">+</button><button class="decrementBtn">-</button><button class="saveBtn">Guardar Config</button><input type="file" class="loadFile" style="display:none"><button class="loadBtn">Cargar Config</button><button class="generateBtn">Compilar y Ejecutar</button></div><div class="screenContainer"></div>`;allScreens.appendChild(container);
const s={id,container,displays:[],counter:0,customChars:{},inputText:container.querySelector('.inputText'),digitSlider:container.querySelector('.digitDelaySlider'),disableDigit:container.querySelector('.disableDigitDelay')};
const sc=container.querySelector('.screenContainer');
const build=(w)=>{sc.innerHTML='';s.displays=[];const row=document.createElement('div');row.className='display-row';for(let i=0;i<w;i++){const d=document.createElement('div');d.className='display';SEG_ORDER.forEach((segName,j)=>{const seg=document.createElement('div');seg.className=`segment ${segName}`;seg.onclick=()=>{const ch=s.inputText.value[i]||' ';s.customChars[ch]=s.customChars[ch]||[0,0,0,0,0,0,0];s.customChars[ch][j]=s.customChars[ch][j]?0:1;};d.appendChild(seg);});row.appendChild(d);s.displays.push(d);}sc.appendChild(row);};
container.querySelector('.createBtn').onclick=()=>{build(parseInt(container.querySelector('.screenWidth').value||3));displayEngine.attach(s);};
container.querySelector('.incrementBtn').onclick=()=>{s.counter++;s.inputText.value=String(s.counter).padStart(s.displays.length,'0');};
container.querySelector('.decrementBtn').onclick=()=>{s.counter=Math.max(0,s.counter-1);s.inputText.value=String(s.counter).padStart(s.displays.length,'0');};
container.querySelector('.saveBtn').onclick=()=>{const blob=new Blob([JSON.stringify({text:s.inputText.value,width:s.displays.length,counter:s.counter,customChars:s.customChars,digitDelay:s.digitSlider.value,disableDigit:s.disableDigit.checked},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`config_screen${id}.json`;a.click();};
container.querySelector('.loadBtn').onclick=()=>container.querySelector('.loadFile').click();
container.querySelector('.loadFile').onchange=(e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{const d=JSON.parse(ev.target.result);s.inputText.value=d.text||'';s.counter=d.counter||0;s.customChars=d.customChars||{};build(d.width||3);displayEngine.attach(s);};r.readAsText(f);};
container.querySelector('.generateBtn').onclick=()=>runCompilation();
build(3);displayEngine.attach(s);
}
function runCompilation(){const src=document.getElementById('codeEditor').value;const prog=compiler.compile(src);cpu.load(prog);runtime.vars={counter:0};runtime.pause=false;log('Compilado y ejecutando. Instrucciones: '+prog.length);}
function log(t){document.getElementById('console').textContent=`${new Date().toLocaleTimeString()} ${t}\n`+document.getElementById('console').textContent;}
const api={lcd_print:(v)=>{const txt=String(runtime.vars[v]??v);const s=allScreens.querySelector('.screen-container')?allScreens.querySelector('.screen-container')._s:null;const first=allScreens.querySelector('.screen-container');if(first){first.querySelector('.inputText').value=txt;}},lcd_set_digit:(i,ch)=>{const first=allScreens.querySelector('.screen-container');if(!first)return;const inp=first.querySelector('.inputText');const arr=inp.value.split('');arr[i]=ch;inp.value=arr.join('');},keypad_read:()=>keypad.scan()||'',delay:(ms)=>{runtime.nextAt=performance.now()+ms;},assign:(k,v)=>runtime.vars[k]=v,assign_add:(k,a,b)=>runtime.vars[k]=(runtime.vars[a]??0)+b};

document.getElementById('addScreenBtn').onclick=()=>{screenCount++;createScreen(screenCount);const containers=allScreens.querySelectorAll('.screen-container');containers[containers.length-1]._s=true;};
document.getElementById('compileAllBtn').onclick=runCompilation;document.getElementById('compileRunBtn').onclick=runCompilation;document.getElementById('pauseBtn').onclick=()=>runtime.pause=!runtime.pause;document.getElementById('stepBtn').onclick=()=>{cpu.step(api);displayEngine.refresh();};document.getElementById('speed').oninput=e=>runtime.speed=parseInt(e.target.value);
const keymap=['1','2','3','4','5','6','7','8','9','*','0','#'];const kp=document.getElementById('keypad');keymap.forEach(k=>{const b=document.createElement('div');b.className='key';b.textContent=k;b.onmousedown=()=>{b.classList.add('active');keypad.press(k)};b.onmouseup=()=>{b.classList.remove('active');keypad.release()};b.onmouseleave=()=>{b.classList.remove('active');keypad.release()};kp.appendChild(b);});
createScreen(++screenCount);
(function frame(){runtime.tick(api);document.getElementById('regs').textContent=`PC:${cpu.pc} SP:${cpu.sp}\nR:${Array.from(cpu.regs).join(', ')}`;document.getElementById('mem').textContent=Array.from(mem.ram.slice(0,64)).join(' ');document.getElementById('pins').textContent=pin.dump();requestAnimationFrame(frame);})();
})();
</script>
</body>
</html>
