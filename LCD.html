<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador 7 Segmentos - Profesional Corregido</title>
<style>
body { font-family: sans-serif; background:#111; color:#eee; text-align:center; padding:20px; }
.screen-container { border:1px solid #444; padding:10px; margin:10px 0; background:#222; border-radius:8px; }
.display-row{display:flex; justify-content:center; flex-wrap:wrap; margin:10px 0;}
.display{position:relative; width:50px; height:100px; margin:5px; cursor:pointer;}
.segment{position:absolute; background:#333; border-radius:5px; transition:0.2s;}
.segment.on{background:#0f0;}
.a{top:0; left:10px; width:30px; height:8px;}
.b{top:8px; right:0; width:8px; height:38px;}
.c{bottom:8px; right:0; width:8px; height:38px;}
.d{bottom:0; left:10px; width:30px; height:8px;}
.e{bottom:8px; left:0; width:8px; height:38px;}
.f{top:8px; left:0; width:8px; height:38px;}
.g{top:46px; left:10px; width:30px; height:8px;}
button{margin:2px;}
input[type=range]{width:200px;}
</style>
</head>
<body>
<h1>Generador 7 Segmentos Profesional - Corregido</h1>
<button id="addScreenBtn">Agregar Pantalla</button>
<button id="generateAllBtn">Generar .ino Combinado</button>
<div id="allScreens"></div>

<script>
const allScreens = document.getElementById('allScreens');
let screenCount = 0;

const defaultSegments = {
'0':['a','b','c','d','e','f'],'1':['b','c'],'2':['a','b','g','e','d'],'3':['a','b','g','c','d'],
'4':['f','g','b','c'],'5':['a','f','g','c','d'],'6':['a','f','g','c','d','e'],'7':['a','b','c'],
'8':['a','b','c','d','e','f','g'],'9':['a','b','c','d','f','g'],'A':['a','b','c','e','f','g'],
'B':['c','d','e','f','g'],'C':['a','d','e','f'],'D':['b','c','d','e','g'],'E':['a','d','e','f','g'],
'F':['a','e','f','g'],'G':['a','c','d','e','f'],'H':['b','c','e','f','g'],'I':['b','c'],'J':['b','c','d'],
'L':['d','e','f'],'O':['a','b','c','d','e','f'],'P':['a','b','e','f','g'],'S':['a','c','d','f','g'],
'U':['b','c','d','e','f'],'-':['g'],'_':['d'],':':['b','c'],' ':[]
};

function createScreen(id){
  const container=document.createElement('div');
  container.classList.add('screen-container');
  container.dataset.screenId=id;
  container.innerHTML=`
<h3>Pantalla ${id}</h3>
<div class="controls">
<label>Texto: <input type="text" class="inputText" maxlength="15" value="123"></label>
<label>Ancho: <input type="number" class="screenWidth" min="1" max="15" value="3"></label>
<label>Multiplexion: <input type="number" class="multiplexLevel" min="1" max="10" value="1"></label><br>
<label>Delay dígito(ms): <input type="range" class="digitDelaySlider" min="0" max="100" value="2"><span class="digitDelayValue">2</span>
<input type="checkbox" class="disableDigitDelay"> Desactivar</label>
<label>Delay pantalla(ms): <input type="range" class="screenDelaySlider" min="0" max="60000" value="0"><span class="screenDelayValue">0</span>
<input type="checkbox" class="disableScreenDelay"> Desactivar</label><br>
<button class="createBtn">Crear Pantalla</button>
<button class="incrementBtn">+</button>
<button class="decrementBtn">-</button>
<button class="saveBtn">Guardar Config</button>
<input type="file" class="loadFile" style="display:none">
<button class="loadBtn">Cargar Config</button>
<button class="generateBtn">Generar .ino Pantalla</button>
</div>
<div class="screenContainer"></div>
`;

allScreens.appendChild(container);

const screenObj={id,container,displays:[],counter:0,customChars:{}};
const c=container;
const inputText=c.querySelector('.inputText');
const screenWidth=c.querySelector('.screenWidth');
const multiplex=c.querySelector('.multiplexLevel');
const digitSlider=c.querySelector('.digitDelaySlider');
const digitValueSpan=c.querySelector('.digitDelayValue');
const screenSlider=c.querySelector('.screenDelaySlider');
const screenValueSpan=c.querySelector('.screenDelayValue');
const disableDigit=c.querySelector('.disableDigitDelay');
const disableScreen=c.querySelector('.disableScreenDelay');
const create=c.querySelector('.createBtn');
const increment=c.querySelector('.incrementBtn');
const decrement=c.querySelector('.decrementBtn');
const save=c.querySelector('.saveBtn');
const loadBtn=c.querySelector('.loadBtn');
const loadFile=c.querySelector('.loadFile');
const generate=c.querySelector('.generateBtn');
const screenContainer=c.querySelector('.screenContainer');

digitSlider.addEventListener('input',()=>{digitValueSpan.textContent=digitSlider.value;});
screenSlider.addEventListener('input',()=>{screenValueSpan.textContent=screenSlider.value;});

function createDisplays(width){
  screenContainer.innerHTML='';
  screenObj.displays=[];
  const row=document.createElement('div'); row.classList.add('display-row');
  for(let i=0;i<width;i++){
    const display=document.createElement('div'); display.classList.add('display');
    ['a','b','c','d','e','f','g'].forEach((cls,j)=>{
      const seg=document.createElement('div'); seg.classList.add('segment',cls);
      seg.addEventListener('click',()=>{
        seg.classList.toggle('on');
        const char=inputText.value[i]||' ';
        screenObj.customChars[char]=screenObj.customChars[char]||[0,0,0,0,0,0,0];
        screenObj.customChars[char][j]=seg.classList.contains('on')?1:0;
        updateDisplays(inputText.value);
      });
      display.appendChild(seg);
    });
    row.appendChild(display);
    screenObj.displays.push(display);
  }
  screenContainer.appendChild(row);
}

function getSegmentStates(char){
  if(screenObj.customChars[char]) return ['a','b','c','d','e','f','g'].filter((s,i)=>screenObj.customChars[char][i]);
  return defaultSegments[char.toUpperCase()]||[];
}

function updateDisplays(text){
  screenObj.displays.forEach((display,i)=>{
    const char=text[i]||' ';
    const segs=getSegmentStates(char);
    display.querySelectorAll('.segment').forEach(seg=>seg.classList.remove('on'));
    display.querySelectorAll('.segment').forEach(seg=>{if(segs.includes(seg.classList[1])) seg.classList.add('on');});
  });
}

function displayCounter(){
  let str=screenObj.counter.toString().padStart(screenObj.displays.length,'0');
  updateDisplays(str);
}

let multiplexInterval=null;
function startMultiplex(){
  if(multiplexInterval) clearInterval(multiplexInterval);
  let index=0;
  multiplexInterval=setInterval(()=>{
    if(disableDigit.checked) return;
    screenObj.displays.forEach((d,i)=>d.style.opacity=(i===index?1:0.2));
    index=(index+1)%screenObj.displays.length;
  },parseInt(digitSlider.value)||1);
}

let screenInterval=null;
function startScreenLoop(){
  if(screenInterval) clearInterval(screenInterval);
  screenInterval=setInterval(()=>{
    if(!disableScreen.checked) updateDisplays(inputText.value);
  },parseInt(screenSlider.value)||10);
}

create.addEventListener('click',()=>{
  createDisplays(parseInt(screenWidth.value));
  updateDisplays(inputText.value);
  displayCounter();
  startMultiplex();
  startScreenLoop();
});

inputText.addEventListener('input',()=>updateDisplays(inputText.value));
increment.addEventListener('click',()=>{screenObj.counter++; displayCounter();});
decrement.addEventListener('click',()=>{screenObj.counter=Math.max(0,screenObj.counter-1); displayCounter();});

save.addEventListener('click',()=>{
  const data={text:inputText.value,width:parseInt(screenWidth.value),counter:screenObj.counter,
multiplex:parseInt(multiplex.value),digitDelay:parseInt(digitSlider.value),screenDelay:parseInt(screenSlider.value),
disableDigit:disableDigit.checked,disableScreen:disableScreen.checked,customChars:screenObj.customChars};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`config_screen${screenObj.id}.json`; a.click();
});

loadBtn.addEventListener('click',()=>loadFile.click());
loadFile.addEventListener('change',(e)=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const data=JSON.parse(ev.target.result);
    inputText.value=data.text;
    screenWidth.value=data.width;
    screenObj.counter=data.counter||0;
    multiplex.value=data.multiplex||1;
    digitSlider.value=data.digitDelay||2; digitValueSpan.textContent=digitSlider.value;
    screenSlider.value=data.screenDelay||0; screenValueSpan.textContent=screenSlider.value;
    disableDigit.checked=data.disableDigit||false;
    disableScreen.checked=data.disableScreen||false;
    screenObj.customChars=data.customChars||{};
    createDisplays(data.width);
    displayCounter();
    startMultiplex();
    startScreenLoop();
  };
  reader.readAsText(file);
});

generate.addEventListener('click',()=>{generateIno(screenObj);});

function generateIno(screenObj){
  const width=parseInt(screenObj.container.querySelector('.screenWidth').value);
  const mux=parseInt(screenObj.container.querySelector('.multiplexLevel').value);
  const digitD=parseInt(screenObj.container.querySelector('.digitDelaySlider').value);
  const screenD=parseInt(screenObj.container.querySelector('.screenDelaySlider').value);
  const disableDigit=screenObj.container.querySelector('.disableDigitDelay').checked;
  const disableScreen=screenObj.container.querySelector('.disableScreenDelay').checked;
  const inputText=screenObj.container.querySelector('.inputText').value;
  const inoLines=[];
  inoLines.push(`// Pantalla ${screenObj.id}, Multiplex x${mux}, Delay dígito ${disableDigit?0:digitD}ms, Delay pantalla ${disableScreen?0:screenD}ms`);
  inoLines.push(`const int totalDisplays=${width};`);
  inoLines.push(`const int segmentPins[7]={2,3,4,5,6,7,8};`);
  inoLines.push(`const int digitPins[totalDisplays]={${Array.from({length:width},(_,i)=>9+i).join(',')}};`);
  inoLines.push(`const int digitDelay=${disableDigit?0:digitD};`);
  inoLines.push(`const int screenDelay=${disableScreen?0:screenD};`);
  // Símbolos
  const charsUsed=Array.from(new Set(inputText.split('').map(c=>c.toUpperCase())));
  charsUsed.forEach(char=>{
    const segs=['a','b','c','d','e','f','g'].map((s,i)=>screenObj.customChars[char]?.[i]|| (defaultSegments[char]?.includes(s)?1:0));
    inoLines.push(`const byte char_${char}[7]={${segs.join(',')}};`);
  });
  // Displays
  for(let i=0;i<width;i++){
    const char=inputText[i]||' ';
    const segs=['a','b','c','d','e','f','g'].map((s,j)=>screenObj.customChars[char]?.[j]|| (defaultSegments[char.toUpperCase()]?.includes(s)?1:0));
    inoLines.push(`const byte display${i+1}[7]={${segs.join(',')}}; // ${char}`);
  }
  inoLines.push(`const byte* displays[totalDisplays]={${Array.from({length:width},(_,i)=>'display'+(i+1)).join(',')}};`);
  inoLines.push(`void setup(){for(int i=0;i<7;i++) pinMode(segmentPins[i],OUTPUT);for(int i=0;i<totalDisplays;i++){pinMode(digitPins[i],OUTPUT); digitalWrite(digitPins[i],LOW);}}`);
  inoLines.push(`void loop(){for(int i=0;i<totalDisplays;i++){activateDigit(i); setSegments(displays[i]); if(digitDelay>0) delay(digitDelay); deactivateDigit(i);} if(screenDelay>0) delay(screenDelay);}`);
  inoLines.push(`void activateDigit(int digit){digitalWrite(digitPins[digit],HIGH);}`);
  inoLines.push(`void deactivateDigit(int digit){digitalWrite(digitPins[digit],LOW);}`);
  inoLines.push(`void setSegments(const byte* seg){for(int i=0;i<7;i++) digitalWrite(segmentPins[i],seg[i]);}`);

  const blob=new Blob([inoLines.join('\n')],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`display_screen${screenObj.id}.ino`; a.click();
  alert(`.ino generado para pantalla ${screenObj.id} con ${charsUsed.length} símbolos.`);
}

createDisplays(3);
updateDisplays('123');
startMultiplex();
startScreenLoop();
}

document.getElementById('addScreenBtn').addEventListener('click',()=>{screenCount++; createScreen(screenCount);});
document.getElementById('generateAllBtn').addEventListener('click',()=>{
  const containers=allScreens.querySelectorAll('.screen-container');
  if(containers.length===0){alert('No hay pantallas'); return;}
  let totalDisplays=0;
  let inoLines=`// Codigo combinado de todas las pantallas\n#include <Arduino.h>\n`;
  containers.forEach((c,i)=>{
    const inputText=c.querySelector('.inputText').value;
    const multiplex=c.querySelector('.multiplexLevel').value;
    const digitSlider=c.querySelector('.digitDelaySlider').value;
    const screenSlider=c.querySelector('.screenDelaySlider').value;
    const disableDigit=c.querySelector('.disableDigitDelay').checked;
    const disableScreen=c.querySelector('.disableScreenDelay').checked;
    const displays=c.querySelectorAll('.display');
    inoLines+=`// Pantalla ${i+1}, Multiplexion x${multiplex}, Delay dígito ${disableDigit?0:digitSlider}ms, Delay pantalla ${disableScreen?0:screenSlider}ms\n`;
    inoLines+=`const int displayCount${i+1}=${displays.length};\n`;
    const charsUsed=Array.from(new Set(inputText.split('').map(c=>c.toUpperCase())));
    charsUsed.forEach(char=>{
      const segs=['a','b','c','d','e','f','g'].map((s,j)=>defaultSegments[char]?.includes(s)?1:0);
      inoLines+=`const byte char_${i+1}_${char}[7]={${segs.join(',')}};\n`;
    });
    displays.forEach((d,j)=>{
      const char=inputText[j]||' ';
      const segs=['a','b','c','d','e','f','g'].map((s,k)=>defaultSegments[char.toUpperCase()]?.includes(s)?1:0);
      inoLines+=`const byte display${i+1}_${j+1}[7]={${segs.join(',')}}; // ${char}\n`;
    });
    totalDisplays+=displays.length;
  });

  inoLines+=`const int totalDisplays=${totalDisplays};\nconst int segmentPins[7]={2,3,4,5,6,7,8};\nconst int digitPins[totalDisplays]={${Array.from({length:totalDisplays},(_,i)=>9+i).join(',')}};\n`;
  inoLines+=`const int digitDelay=2;\nconst int screenDelay=0;\n\n`;
  inoLines+=`void setup(){for(int i=0;i<7;i++) pinMode(segmentPins[i],OUTPUT);for(int i=0;i<totalDisplays;i++){pinMode(digitPins[i],OUTPUT); digitalWrite(digitPins[i],LOW);}}\n`;
  inoLines+=`void loop(){for(int i=0;i<totalDisplays;i++){activateDigit(i); setSegments(displays[i]); if(digitDelay>0) delay(digitDelay); deactivateDigit(i);} if(screenDelay>0) delay(screenDelay);}\n`;
  inoLines+=`void activateDigit(int digit){digitalWrite(digitPins[digit],HIGH);}\nvoid deactivateDigit(int digit){digitalWrite(digitPins[digit],LOW);}\nvoid setSegments(const byte* seg){for(int i=0;i<7;i++) digitalWrite(segmentPins[i],seg[i]);}\n`;

  const blob=new Blob([inoLines],{type:"text/plain"});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`display_all_screens.ino`; a.click();
  alert('Archivo .ino combinado generado correctamente.');
});
</script>
</body>
</html>
